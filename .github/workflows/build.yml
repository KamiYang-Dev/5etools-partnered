name: Build Partnered Library

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and build library
        run: |
          mkdir -p data/bestiary search

          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, os

          BASE = "https://raw.githubusercontent.com/TheGiddyLimit/homebrew/master"

          FILES = [
            "collection/Darrington Press; Tal'Dorei Campaign Setting Reborn.json",
            "collection/Matthew Mercer; TalDorei Campaign Guide.json",
            "creature/Kobold Press; Tome of Beasts.json",
            "creature/Kobold Press; Tome of Beasts 1 (2023 Edition).json",
            "creature/Kobold Press; Tome of Beasts 2.json",
            "creature/Kobold Press; Tome of Beasts 3.json",
            "creature/Kobold Press; Creature Codex.json",
            "creature/Ghostfire Gaming; Dungeons of Drakkenheim.json",
          ]

          index_entries = []
          source_map = {}
          source_id = 0

          for f in FILES:
            encoded = urllib.parse.quote(f)
            url = f"{BASE}/{encoded}"
            outname = f.replace("/", "-").replace(" ", "-").replace(";", "").replace("'", "")
            outpath = f"data/bestiary/{outname}"
            try:
              urllib.request.urlretrieve(url, outpath)
              print(f"OK: {f}")

              with open(outpath, "r", encoding="utf-8") as fp:
                data = json.load(fp)

              source_full_name = f.split('/')[-1].split(';')[0].strip()
              source_code = source_full_name.replace(" ", "").replace("'", "")

              if source_code not in source_map:
                  source_map[source_code] = source_id
                  source_id += 1

              monsters = data.get("monster", [])
              for m in monsters:
                name = m.get("name", "")
                entry = {
                  "id": len(index_entries),
                  "c": 1,
                  "n": name,
                  "s": source_map[source_code],
                  "u": f"{name}_{source_code}".lower().replace(" ", "_").replace(",", ""),
                  "uu": name.lower(),
                  "h": 1
                }
                index_entries.append(entry)

            except Exception as e:
              print(f"FAIL: {f} -> {e}")

          # Crear el sourceMap que Full Suite necesita
          source_names = {}
          for source_code, source_id in source_map.items():
              if "Matthew" in source_code:
                  source_names[source_id] = "Matthew Mercer - Tal'Dorei Campaign Guide"
              elif "Kobold" in source_code:
                  source_names[source_id] = "Kobold Press - Tome of Beasts"
              else:
                  source_names[source_id] = source_code

          index = {"x": index_entries, "sourceMap": source_names}
          with open("search/index.json", "w", encoding="utf-8") as fp:
            json.dump(index, fp, indent=2, ensure_ascii=False)
          print(f"index.json: {len(index_entries)} monsters, sourceMap: {source_names}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ search/
          git diff --cached --quiet || git commit -m "Auto-update partnered library"
          git push
