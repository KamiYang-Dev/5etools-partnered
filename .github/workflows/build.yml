name: Build Partnered Library

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and build library
        run: |
          mkdir -p data/bestiary search

          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, os

          BASE = "https://cdn.jsdelivr.net/gh/TheGiddyLimit/homebrew@master"

          FILES = [
            "collection/Darrington Press; Tal'Dorei Campaign Setting Reborn.json",
            "collection/Matthew Mercer; TalDorei Campaign Guide.json",
            "creature/Kobold Press; Tome of Beasts.json",
            "creature/Kobold Press; Tome of Beasts 1 (2023 Edition).json",
            "creature/Kobold Press; Tome of Beasts 2.json",
            "creature/Kobold Press; Tome of Beasts 3.json",
            "creature/Kobold Press; Creature Codex.json",
            "creature/Ghostfire Gaming; Dungeons of Drakkenheim.json",
          ]

          by_source = {}

          for f in FILES:
            encoded = urllib.parse.quote(f)
            url = f"{BASE}/{encoded}"
            try:
              tmp = "/tmp/tmp_hb.json"
              urllib.request.urlretrieve(url, tmp)
              print(f"OK: {f}")

              with open(tmp, "r", encoding="utf-8") as fp:
                data = json.load(fp)

              monsters = data.get("monster", [])
              for m in monsters:
                source = m.get("source", "HOMEBREW")
                if source not in by_source:
                  by_source[source] = []
                by_source[source].append(m)

            except Exception as e:
              print(f"FAIL: {f} -> {e}")

          index_entries = []
          source_map = {}

          for source, monsters in by_source.items():
            outpath = f"data/bestiary/bestiary-{source}.json"
            with open(outpath, "w", encoding="utf-8") as fp:
              json.dump({"monster": monsters}, fp, ensure_ascii=False)

            source_map[source] = outpath

            for m in monsters:
              name = m.get("name", "")
              page = m.get("page", 0)
              entry = {
                "n": name,
                "s": source,
                "c": 1,
                "p": page if isinstance(page, int) else 0,
                "u": f"{name}_{source}".lower().replace(" ", "_").replace(",", "")
              }
              index_entries.append(entry)

          index = {"x": index_entries, "m": {"s": source_map}}
          with open("search/index.json", "w", encoding="utf-8") as fp:
            json.dump(index, fp, indent=2, ensure_ascii=False)
          print(f"Done: {len(index_entries)} monsters, {len(by_source)} sources")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ search/
          git diff --cached --quiet || git commit -m "Auto-update partnered library"
          git push
