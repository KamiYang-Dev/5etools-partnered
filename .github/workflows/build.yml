name: Build Partnered Library

on:
  schedule:
    - cron: '0 6 * * *'  # Se actualiza cada día
  workflow_dispatch:       # También puedes lanzarlo manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download partnered creature files
        run: |
          mkdir -p data/bestiary

          BASE="https://raw.githubusercontent.com/TheGiddyLimit/homebrew/master"

          declare -a FILES=(
            "collection/Darrington Press; Tal'Dorei Campaign Setting Reborn.json"
            "collection/Matthew Mercer; TalDorei Campaign Guide.json"
            "creature/Kobold Press; Tome of Beasts.json"
            "creature/Kobold Press; Tome of Beasts 1 (2023 Edition).json"
            "creature/Kobold Press; Tome of Beasts 2.json"
            "creature/Kobold Press; Tome of Beasts 3.json"
            "creature/Kobold Press; Creature Codex.json"
            "creature/Ghostfire Gaming; Dungeons of Drakkenheim.json"
          )

          for FILE in "${FILES[@]}"; do
            ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$FILE'))")
            OUTNAME=$(basename "$FILE" | sed 's/ /-/g' | sed 's/;/-/g')
            curl -sSL "$BASE/$ENCODED" -o "data/bestiary/$OUTNAME" || echo "Failed: $FILE"
          done

      - name: Build search/index.json
        run: |
          mkdir -p search
          python3 - <<'EOF'
          import os, json
          files = os.listdir("data/bestiary")
          index = {"monsters": [f"data/bestiary/{f}" for f in sorted(files) if f.endswith(".json")]}
          with open("search/index.json", "w") as f:
              json.dump(index, f, indent=2)
          print("index.json generated with", len(index["monsters"]), "files")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ search/
          git diff --cached --quiet || git commit -m "Auto-update partnered library"
          git push
